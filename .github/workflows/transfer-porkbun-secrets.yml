            -encrypt \
            -binary \
            -aes-256-cbc \
            -in payload.json \
            -outform DER \
            -out porkbun-secrets.cms \
            transfer-cert.pem

      - name: Upload encrypted payload
        uses: actions/upload-artifact@v4
        with:
          name: porkbun-secrets-encrypted
          path: porkbun-secrets.cms
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
