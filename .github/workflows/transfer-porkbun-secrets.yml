name: One-time encrypted Porkbun secret transfer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Encrypt Porkbun credentials for the VPS
        shell: bash
        env:
          PB_API: ${{ secrets.PB_API }}
          PB_SECRET: ${{ secrets.PB_SECRET }}
        run: |
          set -euo pipefail
          umask 077

          if [[ -z "${PB_API:-}" || -z "${PB_SECRET:-}" ]]; then
            echo "::error::PB_API or PB_SECRET is missing."
            exit 1
          fi

          cleanup() {
            rm -f payload.json transfer-cert.pem
          }
          trap cleanup EXIT

          jq -n \
            --arg api "$PB_API" \
            --arg secret "$PB_SECRET" \
            '{api: $api, secret: $secret}' > payload.json

          cat > transfer-cert.pem <<'CERTIFICATE'
