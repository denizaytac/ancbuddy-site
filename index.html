    <div id=root></div>
<style>
/* Testimonials Marquee */
.testimonials-section{padding:80px 0;background:#fff;overflow:hidden;position:relative}
.testimonials-section h2{text-align:center;font-size:1.875rem;font-weight:700;color:#36454f;margin-bottom:8px;letter-spacing:-.025em}
.testimonials-section .testimonials-sub{text-align:center;color:#708090;font-size:1.125rem;margin-bottom:48px}
.marquee-container{position:relative;width:100%;overflow:hidden}
.marquee-container::before,.marquee-container::after{content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
.marquee-container::before{left:0;background:linear-gradient(to right,#fff,transparent)}
.marquee-container::after{right:0;background:linear-gradient(to left,#fff,transparent)}
.marquee-track{display:flex;gap:24px;animation:marquee-scroll 35s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
@keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.testimonial-card{flex-shrink:0;width:380px;background:#f8f9fa;border:1px solid #e9ecef;border-radius:16px;padding:28px 32px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .3s ease,transform .3s ease}
.testimonial-card:hover{box-shadow:0 8px 30px rgba(54,69,79,.1);transform:translateY(-2px)}
.testimonial-quote{color:#36454f;font-size:.975rem;line-height:1.7;font-style:italic;flex:1}
.testimonial-quote::before{content:'\201C';font-size:1.5rem;color:#708090;margin-right:2px}
.testimonial-quote::after{content:'\201D';font-size:1.5rem;color:#708090;margin-left:2px}
.testimonial-author{display:flex;align-items:center;gap:12px}
.testimonial-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#36454f,#708090);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:600}
.testimonial-name{color:#708090;font-size:.875rem;font-weight:500}
.testimonial-badge{font-size:.7rem;color:#fff;background:#36454f;padding:2px 8px;border-radius:99px;margin-left:auto;font-weight:500;letter-spacing:.03em}
@media(max-width:640px){.testimonial-card{width:300px;padding:20px 24px}.marquee-container::before,.marquee-container::after{width:40px}.testimonials-section{padding:48px 0}.testimonials-section h2{font-size:1.5rem}}
/* Hide changelog timeline dots and vertical line */
.absolute.left-2\.5[style*="border-radius"]{display:none!important}
.absolute.left-4.top-0.bottom-0[style*="width: 2px"]{display:none!important}
</style>
<script>
(function(){
  var INJECTED=false;
  var testimonials=[
    {quote:"I can also confirm it works fine :). Slight delay but that\u0027s not an issue",author:"O.",badge:"Gen 2 User"},
    {quote:"Yes this works! Nice job! Any way you can set up voice prompts when switching modes? That would be cool",author:"I.",badge:"Gen 2 Tester"},
    {quote:"It works well. I also tested multi-point connection between my MacBook and smartphone. It works as well!",author:"T.",badge:"Earbuds 2nd Gen"},
    {quote:"Excellent work!",author:"M.",badge:"QC Ultra User"},
    {quote:"If you need another 2nd gen for testing. Send over to me. Happy to test it. This sounds great. With the recent software update issues many 2nd gen users have moved away from the Bose app to avoid upgrading. So this sounds like a great solution.",author:"O.",badge:"Gen 2 User"}
  ];
  function buildCards(){
    return testimonials.map(function(t){
      return '<div class="testimonial-card"><div class="testimonial-quote">'+t.quote+'</div><div class="testimonial-author"><div class="testimonial-avatar">'+t.author.charAt(0)+'</div><span class="testimonial-name">User '+t.author+'</span><span class="testimonial-badge">'+t.badge+'</span></div></div>';
    }).join('');
  }
  function findSectionByText(root,keywords){
    var h2s=root.querySelectorAll('h2');
    for(var i=0;i<h2s.length;i++){
      var txt=h2s[i].textContent.toLowerCase();
      for(var k=0;k<keywords.length;k++){
        if(txt.indexOf(keywords[k])!==-1){
          var el=h2s[i];
          while(el&&el.parentElement!==root&&el.parentElement){
            if(el.parentElement.children.length>1){return el;}
            el=el.parentElement;
          }
          return el;
        }
      }
    }
    return null;
  }
  function inject(){
    if(INJECTED)return;
    var root=document.getElementById('root');
    if(!root||!root.children.length)return;
    var wrapper=root.children[0];
    if(!wrapper||wrapper.children.length<3)return;
    var target=findSectionByText(wrapper,['pricing','preis','get bosecontrol','$9.99']);
    if(!target)target=findSectionByText(wrapper,['faq','frequently']);
    if(!target){
      var kids=wrapper.children;
      if(kids.length>=5){target=kids[Math.floor(kids.length*0.7)];}
    }
    if(!target)return;
    INJECTED=true;
    var section=document.createElement('section');
    section.className='testimonials-section';
    var cards=buildCards();
    section.innerHTML='<h2>Loved by Bose Users</h2><p class="testimonials-sub">Real feedback from the community</p><div class="marquee-container"><div class="marquee-track">'+cards+cards+'</div></div>';
    target.parentNode.insertBefore(section,target);
  }
  var observer=new MutationObserver(function(mutations,obs){
    var root=document.getElementById('root');
    if(root&&root.children.length>0&&root.querySelector('h2')){
      obs.disconnect();
      setTimeout(inject,300);
    }
  });
  if(document.body){observer.observe(document.body,{childList:true,subtree:true});}
  else{document.addEventListener('DOMContentLoaded',function(){observer.observe(document.body,{childList:true,subtree:true});});}
  setTimeout(function(){if(!INJECTED)inject();},2000);
